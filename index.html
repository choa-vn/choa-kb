<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHOA — Architectural Knowledge Base</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Nhúng font chữ Be Vietnam Pro theo yêu cầu -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
/* ĐỊNH NGHĨA HỆ THỐNG BIẾN CHUẨN THEO YÊU CẦU */
:root {
  --font-main: 'Be Vietnam Pro', sans-serif;
  
  /* Cỡ chữ chỉ định */
  --sz-10: 10px;
  --sz-15: 15px;
  --sz-20: 20px;
  --sz-30: 30px;
  
  /* Khoảng cách quy định */
  --sp-3: 3px;
  --sp-6: 6px;
  --sp-12: 12px;
  --sp-15: 15px;
  
  /* Bảng màu Brutalist tương phản cao */
  --c-black: #000000;
  --c-white: #ffffff;
  --c-dark-gray: #1a1a1a;
  --c-med-gray: #333333;
  --c-light-gray: #cccccc;
  --border-white: 1px solid #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-main);
  background-color: var(--c-black);
  color: var(--c-white);
  height: 100vh;
  overflow: hidden; /* Khóa cuộn trang tuyệt đối để cố định khung */
  padding-right: 40px; /* Dành chỗ cho menu siêu mỏng biên phải */
}

/* NAV — THANH MENU CỐ ĐỊNH BÊN PHẢI */
.nav {
  display: flex;
  flex-direction: column;
  border-left: var(--border-white);
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 40px;
  z-index: 500;
  background: var(--c-black);
}
.nav-logo {
  padding: var(--sp-12);
  border-bottom: var(--border-white);
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-img {
  width: 100%;
  height: auto;
  display: block;
  filter: invert(1);
}
.nav-btn {
  padding: 24px 0;
  border: none;
  border-bottom: var(--border-white);
  background: transparent;
  font-family: var(--font-main);
  font-size: var(--sz-10);
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--c-white);
  cursor: pointer;
  writing-mode: vertical-rl;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}
.nav-btn:hover { background: var(--c-dark-gray); }
.nav-btn.active { background: var(--c-white); color: var(--c-black); }
.nav-status {
  margin-top: auto;
  padding: var(--sp-15) 0;
  font-size: var(--sz-10);
  color: var(--c-light-gray);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-6);
  border-top: var(--border-white);
}
.nav-status span { writing-mode: vertical-rl; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
.dot.online { background: #22c55e; }

/* VIEWS LAYOUT */
.view { display: none; height: 100vh; width: 100%; }
.view.active { display: block; }

/* ────────────────────────────────────────────────────────
   VIEW 1: THƯ VIỆN (LIST VIEW BẢN MỚI)
   ──────────────────────────────────────────────────────── */
#view-list {
  padding: var(--sp-15);
  overflow-y: auto;
}
.search-bar {
  display: flex;
  align-items: center;
  border: var(--border-white);
  margin-bottom: var(--sp-15);
  background: var(--c-black);
}
.search-bar .slbl {
  padding: var(--sp-12);
  font-size: var(--sz-10);
  font-weight: 800;
  text-transform: uppercase;
  border-right: var(--border-white);
}
.search-bar input, .search-bar select {
  background: transparent;
  border: none;
  color: var(--c-white);
  padding: var(--sp-12);
  font-family: var(--font-main);
  font-size: var(--sz-15);
  outline: none;
}
.search-bar select {
  border-right: var(--border-white);
  cursor: pointer;
}
.list-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--sp-12);
}
.l-card {
  border: var(--border-white);
  padding: var(--sp-15);
  cursor: pointer;
  background: var(--c-black);
  transition: background 0.2s;
}
.l-card:hover { background: var(--c-dark-gray); }
.l-cat { font-size: var(--sz-10); color: var(--c-light-gray); text-transform: uppercase; margin-bottom: var(--sp-6); }
.l-name { font-size: var(--sz-20); font-weight: 800; margin-bottom: var(--sp-6); }
.l-meta { font-size: var(--sz-15); color: var(--c-light-gray); }

/* ────────────────────────────────────────────────────────
   VIEW 2: CHI TIẾT NGHIÊN CỨU (DASHBOARD ĐÚNG THEO HÌNH VẼ)
   ──────────────────────────────────────────────────────── */
.dashboard-layout {
  display: grid;
  /* Phân bổ tỷ lệ các cột từ trái qua phải tương tự hình ảnh */
  grid-template-columns: 280px 240px 1fr 340px;
  height: 100vh;
  width: 100%;
  background: var(--c-black);
}

/* Các đường viền đứng phân chia cột chính */
.dash-col {
  border-right: var(--border-white);
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.dash-col:last-child {
  border-right: none;
}

/* CỘT 1: THÔNG TIN CƠ BẢN VÀ CÁC TAB KHỐI TRÁI */
.col-left-meta {
  display: flex;
  flex-direction: column;
}

/* Khối Tên công trình & studio */
.meta-title-section {
  padding: var(--sp-15);
  border-bottom: var(--border-white);
}
.project-title {
  font-size: var(--sz-30);
  font-weight: 900;
  line-height: 1.1;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  margin-bottom: var(--sp-15);
}
.meta-row-item {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-12);
  margin-bottom: var(--sp-12);
}
.meta-row-item:last-child { margin-bottom: 0; }
.meta-badge {
  background: var(--c-white);
  color: var(--c-black);
  font-size: var(--sz-10);
  font-weight: 900;
  padding: var(--sp-3) var(--sp-6);
  min-width: 35px;
  text-align: center;
}
.meta-label-group {
  display: flex;
  flex-direction: column;
}
.meta-lbl { font-size: var(--sz-10); color: var(--c-light-gray); text-transform: uppercase; }
.meta-val { font-size: var(--sz-15); font-weight: 600; text-transform: uppercase; }

/* Khối THÔNG TIN xếp dọc ở giữa */
.info-tabs-section {
  padding: var(--sp-15);
  border-bottom: var(--border-white);
}
.section-title-20 {
  font-size: var(--sz-20);
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: var(--sp-12);
  letter-spacing: -0.01em;
}
.tab-stack {
  display: flex;
  flex-direction: column;
  gap: var(--sp-6);
}
.tab-row-btn {
  width: 100%;
  background: var(--c-white);
  color: var(--c-black);
  border: none;
  padding: var(--sp-12);
  font-family: var(--font-main);
  font-size: var(--sz-15);
  font-weight: 800;
  text-transform: uppercase;
  text-align: center;
  cursor: pointer;
}

/* Khối Bảng thông số kỹ thuật ở dưới cùng */
.specs-section {
  padding: var(--sp-15);
  flex-grow: 1;
  display: flex;
  flex-direction: column;
}
.specs-table {
  width: 100%;
  border-collapse: collapse;
}
.specs-table td {
  border: var(--border-white);
  padding: var(--sp-12);
  font-size: var(--sz-15);
  font-weight: 600;
  text-transform: uppercase;
}
.specs-table td:first-child {
  background: var(--c-dark-gray);
  width: 55%;
}
.specs-table td:last-child {
  text-align: center;
}

/* CỘT 2: BA Ô PHẦN TỬ DỌC (YẾU TỐ 1, 2, 3) */
.col-factors-stack {
  display: grid;
  grid-template-rows: repeat(3, 1fr); /* Chia đều thành 3 phần bằng nhau dọc màn hình */
}
.factor-card {
  border-bottom: var(--border-white);
  padding: var(--sp-12);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: background 0.2s;
}
.factor-card:last-child { border-bottom: none; }
.factor-card:hover, .factor-card.active { background: var(--c-dark-gray); }
.factor-preview-box {
  background-color: var(--c-med-gray);
  flex-grow: 1;
  margin: var(--sp-6) 0;
  border: 1px solid #444;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.factor-preview-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.factor-footer-text {
  font-size: var(--sz-10);
  color: var(--c-light-gray);
  text-transform: uppercase;
}

/* CỘT 3: KHÔNG GIAN HIỂN THỊ YẾU TỐ CHÍNH TRUNG TÂM */
.col-main-display {
  padding: var(--sp-15);
  display: flex;
  flex-direction: column;
}
.center-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: var(--sp-12);
}
.center-title-20 {
  font-size: var(--sz-20);
  font-weight: 800;
  line-height: 1.1;
  text-transform: uppercase;
}
.center-desc-10 {
  font-size: var(--sz-10);
  color: var(--c-light-gray);
  text-align: right;
  line-height: 1.4;
  max-width: 60%;
}
.center-content-canvas {
  flex-grow: 1;
  background-color: var(--c-dark-gray);
  border: var(--border-white);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
}
.canvas-inner-render {
  width: 100%;
  height: calc(100% - 40px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-15);
}
/* Thiết kế khung ảnh theo tỷ lệ khổ giấy in ấn */
.canvas-print-frame {
  max-width: 100%;
  max-height: 100%;
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
  border: 1px solid #444;
  background: #000;
}
.canvas-text-render {
  font-size: var(--sz-15);
  line-height: 1.6;
  padding: var(--sp-15);
  overflow-y: auto;
  width: 100%;
  height: 100%;
}
/* Dải 6 ô vuông chia đều ở đáy khối trung tâm đúng theo hình vẽ */
.center-bottom-segments {
  height: 40px;
  border-top: var(--border-white);
  display: grid;
  grid-template-columns: repeat(6, 1fr);
}
.segment-box {
  border-right: var(--border-white);
}
.segment-box:last-child { border-right: none; }

/* CỘT 4: DANH SÁCH LIÊN KẾT PHẢI (VẬT LIỆU, CHI TIẾT, NỘI THẤT) */
.col-right-links {
  display: grid;
  grid-template-rows: repeat(3, 1fr); /* 3 nhóm liên kết chia đều dọc màn hình */
}
.link-section-group {
  border-bottom: var(--border-white);
  padding: var(--sp-12);
  display: flex;
  gap: var(--sp-12);
  overflow: hidden;
}
.link-section-group:last-child { border-bottom: none; }
.link-vertical-title {
  font-size: var(--sz-20);
  font-weight: 900;
  text-transform: uppercase;
  width: 30px;
  word-break: break-all;
  line-height: 1;
  padding-top: var(--sp-3);
}
.link-matrix-grid {
  flex-grow: 1;
  display: grid;
  grid-template-columns: 1fr 1fr; /* Hệ lưới 2 cột nhỏ đặt cạnh nhau */
  grid-template-rows: repeat(4, 1fr);
  gap: var(--sp-3);
}
.matrix-item {
  border: var(--border-white);
  background: var(--c-black);
  padding: var(--sp-3) var(--sp-6);
  display: flex;
  flex-direction: column;
  justify-content: center;
  cursor: pointer;
}
.matrix-item:hover { background: var(--c-dark-gray); }
.matrix-item.active { background: var(--c-white); color: var(--c-black); }
.matrix-code { font-size: var(--sz-10); font-weight: 800; line-height: 1.1; }
.matrix-name { font-size: var(--sz-10); color: var(--c-light-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.matrix-item.active .matrix-name { color: #444; }
.matrix-more-badge {
  background: var(--c-med-gray);
  color: var(--c-white);
  font-size: var(--sz-15);
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  border: var(--border-white);
}

/* ────────────────────────────────────────────────────────
   VIEW 3: FORM THÊM MỚI / CHỈNH SỬA
   ──────────────────────────────────────────────────────── */
#view-add {
  padding: var(--sp-15);
  overflow-y: auto;
}
.form-container {
  max-width: 800px;
  margin: 0 auto;
  border: var(--border-white);
  padding: var(--sp-15);
  background: var(--c-black);
}
.form-field {
  margin-bottom: var(--sp-12);
}
.form-field label {
  display: block;
  font-size: var(--sz-10);
  text-transform: uppercase;
  margin-bottom: var(--sp-3);
  color: var(--c-light-gray);
}
.form-field input, .form-field textarea, .form-field select {
  width: 100%;
  background: var(--c-dark-gray);
  border: var(--border-white);
  color: var(--c-white);
  padding: var(--sp-12);
  font-family: var(--font-main);
  font-size: var(--sz-15);
  outline: none;
}
.form-submit-btn {
  background: var(--c-white);
  color: var(--c-black);
  font-weight: 800;
  border: none;
  width: 100%;
  padding: var(--sp-15);
  font-family: var(--font-main);
  font-size: var(--sz-15);
  text-transform: uppercase;
  cursor: pointer;
}

/* TOAST NOTIFICATION */
#toast {
  position: fixed;
  bottom: var(--sp-15);
  left: var(--sp-15);
  background: var(--c-white);
  color: var(--c-black);
  padding: var(--sp-12) var(--sp-15);
  font-size: var(--sz-15);
  font-weight: 600;
  z-index: 999;
  display: none;
  border: var(--border-white);
}

/* BACK BUTTON TRÊN TRANG DETAIL */
.back-floating-btn {
  background: transparent;
  color: var(--c-white);
  border: var(--border-white);
  padding: var(--sp-6) var(--sp-12);
  font-size: var(--sz-10);
  text-transform: uppercase;
  cursor: pointer;
  margin-bottom: var(--sp-6);
  font-family: var(--font-main);
}
.back-floating-btn:hover { background: var(--c-white); color: var(--c-black); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- THANH ĐIỀU HƯỚNG FIXED PHẢI MÀN HÌNH -->
<div class="nav">
  <div class="nav-logo">
    <img src="logo.jpg" alt="Logo" class="logo-img">
  </div>
  <button class="nav-btn active" id="nb-list" onclick="goView('list')">Thư viện</button>
  <button class="nav-btn" id="nb-add" onclick="startAdd()">+ Thêm mục</button>
  <button class="nav-btn" id="nb-det" onclick="goView('detail')" style="display:none">Chi tiết</button>
  <div class="nav-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-txt">ĐỒNG BỘ</span>
  </div>
</div>

<!-- ────────────────────────────────────────────────────────
     GIAO DIỆN 1: DANH SÁCH THƯ VIỆN
     ──────────────────────────────────────────────────────── -->
<div class="view active" id="view-list">
  <div class="search-bar">
    <span class="slbl">Bộ lọc</span>
    <select id="fcat" onchange="renderList()">
      <option value="all">Tất cả tư liệu</option>
      <option value="ct">Công trình nghiên cứu</option>
      <option value="vl">Hệ thống vật liệu</option>
      <option value="cd">Chi tiết cấu tạo</option>
    </select>
    <input type="text" id="fsearch" placeholder="Gõ từ khóa để tìm kiếm..." oninput="renderList()" style="flex:1">
  </div>
  <div class="list-grid" id="list-grid"></div>
</div>

<!-- ────────────────────────────────────────────────────────
     GIAO DIỆN 2: BẢNG NGHIÊN CỨU CÔNG TRÌNH CỐ ĐỊNH (6x3 DASHBOARD)
     ──────────────────────────────────────────────────────── -->
<div class="view" id="view-detail">
  <div style="padding: var(--sp-12) 0 0 var(--sp-15);">
    <button class="back-floating-btn" onclick="goView('list')">← QUAY LẠI THƯ VIỆN</button>
  </div>
  
  <div class="dashboard-layout" id="dashboard-content-canvas">
    <!-- Nội dung Dashboard được sinh động bởi JavaScript dựa theo hình ảnh cấu trúc -->
  </div>
</div>

<!-- ────────────────────────────────────────────────────────
     GIAO DIỆN 3: FORM NHẬP LIỆU DỮ LIỆU
     ──────────────────────────────────────────────────────── -->
<div class="view" id="view-add">
  <div class="form-container">
    <div class="section-title-20" id="form-mode-title">Thêm mục nghiên cứu mới</div>
    
    <div class="form-field">
      <label>Phân loại danh mục nghiên cứu</label>
      <select id="etype">
        <option value="ct">Công trình kiến trúc</option>
        <option value="vl">Vật liệu & Bề mặt</option>
        <option value="cd">Chi tiết cấu tạo & Liên kết</option>
      </select>
    </div>
    
    <div class="form-field">
      <label>Tên mục nghiên cứu (Tên công trình / Vật liệu)*</label>
      <input type="text" id="e-ten" placeholder="Nhập tên chính xác...">
    </div>
    
    <div class="form-field">
      <label>Chủ trì / Studio Thiết kế</label>
      <input type="text" id="e-kts" placeholder="Ví dụ: OMA, Kengo Kuma & Associates...">
    </div>

    <div class="form-field">
      <label>Quốc gia / Địa điểm</label>
      <input type="text" id="e-vitri" placeholder="Ví dụ: Nhật Bản, Pháp, Hà Nội...">
    </div>

    <div class="form-field">
      <label>Thể loại công trình / Nhóm cấu tạo</label>
      <input type="text" id="e-theloai" placeholder="Ví dụ: Nhà ở, Bảo tàng, Cấu tạo mái...">
    </div>

    <div class="form-field">
      <label>Phong cách kiến trúc / Đặc trưng lý thuyết</label>
      <input type="text" id="e-pc" placeholder="Ví dụ: Brutalism, Minimalism, Bản địa hóa...">
    </div>

    <div class="form-field">
      <label>Đường dẫn ảnh Ngoại thất (URL)</label>
      <input type="text" id="e-img-ngoai" placeholder="https://url-anh-ngoai-that.jpg">
    </div>

    <div class="form-field">
      <label>Đường dẫn ảnh Nội thất (URL)</label>
      <input type="text" id="e-img-noi" placeholder="https://url-anh-noi-that.jpg">
    </div>

    <div class="form-field">
      <label>Đường dẫn ảnh Mặt bằng / Bản vẽ kỹ thuật (URL)</label>
      <input type="text" id="e-img-banve" placeholder="https://url-anh-ban-ve.jpg">
    </div>

    <div class="form-field">
      <label>Văn bản phân tích / Ghi chú lý thuyết chi tiết</label>
      <textarea id="e-body" rows="6" placeholder="Nhập các phân tích lý thuyết chuyên sâu..."></textarea>
    </div>

    <button class="form-submit-btn" onclick="saveEntry()">LƯU DỮ LIỆU VÀO THƯ VIỆN →</button>
  </div>
</div>

<script>
/* ── THIẾT LẬP KẾT NỐI DATABASE SUPABASE ── */
const SUPA_URL = 'https://mensqirmgksktrjdnyqi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lbnNxaXJtZ2tza3RyamRueXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjMwMDQsImV4cCI6MjA5NzMzOTAwNH0.R78C7oDxHv3EXq8EH88PiD2-ibOJbuWo7B2o3-2R9ok';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

let entries = [];
let currentId = null;

async function init() {
  try {
    const { data, error } = await db.from('entries').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    entries = data || [];
    setOnlineStatus(true);
    renderList();
  } catch (e) {
    setOnlineStatus(false);
    showToast('Lỗi tải dữ liệu Supabase: ' + e.message);
  }
}

function setOnlineStatus(isOnline) {
  document.getElementById('status-dot').className = 'dot' + (isOnline ? ' online' : '');
  document.getElementById('status-txt').textContent = isOnline ? 'ĐỒNG BỘ' : 'OFFLINE';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function goView(v) {
  ['list', 'detail', 'add'].forEach(x => {
    document.getElementById('view-' + x).classList.toggle('active', x === v);
    const btn = document.getElementById('nb-' + x);
    if (btn) btn.classList.toggle('active', x === v);
  });
  document.getElementById('nb-det').style.display = (v === 'detail') ? '' : 'none';
}

/* RENDER DANH SÁCH TƯ LIỆU */
function renderList() {
  const cat = document.getElementById('fcat').value;
  const q = document.getElementById('fsearch').value.toLowerCase();
  const grid = document.getElementById('list-grid');
  
  const filtered = entries.filter(e => (cat === 'all' || e.type === cat) && (!q || e.ten.toLowerCase().includes(q)));
  
  if (!filtered.length) {
    grid.innerHTML = `<div style="padding: var(--sp-15); color: var(--c-light-gray);">Không tìm thấy dữ liệu phù hợp.</div>`;
    return;
  }
  
  grid.innerHTML = filtered.map(e => `
    <div class="l-card" onclick="showDetail('${e.id}')">
      <div class="l-cat">${e.type === 'ct' ? 'Công trình' : e.type === 'vl' ? 'Vật liệu' : 'Cấu tạo'}</div>
      <div class="l-name">${e.ten}</div>
      <div class="l-meta">${e.meta?.kts || '—'} · ${e.meta?.vitri || '—'}</div>
    </div>
  `).join('');
}

/* ── XỬ LÝ HIGHLIGHT VÀ ĐỔI ẢNH ĐỘNG Ở KHỐI TRUNG TÂM KHI CLICK 3 Ô BÊN TRÁI ── */
function selectFactor(index, imgUrl, label) {
  // Highlight phần tử đang chọn ở cột 2
  document.querySelectorAll('.factor-card').forEach(c => c.classList.remove('active'));
  const activeCard = document.getElementById(`factor-card-${index}`);
  if (activeCard) activeCard.classList.add('active');

  // Đổi tiêu đề khối trung tâm chính xác theo yếu tố
  document.getElementById('center-factor-title').innerHTML = `${label}<br>${label}`;
  
  const canvas = document.getElementById('center-canvas-content');
  if (imgUrl && imgUrl.startsWith('http')) {
    // Đưa ảnh vào theo khung khổ giấy in cố định
    canvas.innerHTML = `<img src="${imgUrl}" class="canvas-print-frame" alt="${label}">`;
  } else {
    // Nếu không có ảnh, kết xuất văn bản phân tích
    const currentEntry = entries.find(x => x.id === currentId);
    canvas.innerHTML = `<div class="canvas-text-render">${currentEntry?.body || 'Chưa có tệp hình ảnh được tải lên cho cấu trúc này. Hãy bổ sung URL ảnh ở chế độ chỉnh sửa.'}</div>`;
  }
}

  document.getElementById('e-ten').value = '';
  document.getElementById('e-kts').value = '';
  document.getElementById('e-vitri').value = '';
  document.getElementById('e-theloai').value = '';
  document.getElementById('e-pc').value = '';
  document.getElementById('e-img-ngoai').value = '';
  document.getElementById('e-img-noi').value = '';
  document.getElementById('e-img-banve').value = '';
  document.getElementById('e-body').value = '';
  goView('add');
}

async function saveEntry() {
  const type = document.getElementById('etype').value;
  const ten = document.getElementById('e-ten').value.trim();
  
  if (!ten) {
    showToast('Bắt buộc phải nhập tên mục nghiên cứu!');
    return;
  }

  const meta = {
    kts: document.getElementById('e-kts').value.trim(),
    vitri: document.getElementById('e-vitri').value.trim(),
    theloai: document.getElementById('e-theloai').value.trim(),
    pc: document.getElementById('e-pc').value.trim(),
    imgNgoai: document.getElementById('e-img-ngoai').value.trim(),
    imgNoi: document.getElementById('e-img-noi').value.trim(),
    imgBanVe: document.getElementById('e-img-banve').value.trim()
  };
  
  const body = document.getElementById('e-body').value.trim();
  const id = 'e' + Date.now();

  try {
    const { error } = await db.from('entries').insert({ id, type, ten, meta, body });
    if (error) throw error;
    
    entries.unshift({ id, type, ten, meta, body });
    showToast('Đã ghi nhận dữ liệu nghiên cứu thành công ✓');
    renderList();
    goView('list');
  } catch (e) {
    showToast('Lỗi hệ thống: ' + e.message);
  }
}

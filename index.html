<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHOA — Knowledge Base</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;--gray:#f4f4f4;--border:#000;
  --font:'Courier New',monospace;
}
/* Đẩy lề phải 40px để nhường chỗ cho thanh menu dọc siêu mỏng */
body{font-family:var(--font);font-size:11px;background:var(--white);color:var(--black);min-height:100vh;padding-right:40px}

/* NAV — Thanh dọc siêu mỏng cố định bên phải */
.nav{
  display:flex;
  flex-direction:column;
  border-left:1px solid var(--border);
  position:fixed;
  top:0;
  right:0;
  bottom:0;
  width:40px; /* Độ rộng siêu mỏng */
  z-index:200;
  background:var(--white);
}

/* Khung chứa logo cách đều ảnh đúng 12px (bằng lề trong của .g-block) */
.nav-logo{
  padding: 12px; 
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Ảnh tự động co giãn vừa vặn với khoảng trống còn lại bên trong khung 40px */
.logo-img{
  width: 100%;
  height: auto;
  display: block;
}

/* Các nút bấm xoay dọc chữ dọc theo menu */
.nav-btn{
  padding:24px 0;
  border:none;
  border-bottom:1px solid var(--border);
  background:transparent;
  font-family:var(--font);
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  writing-mode:vertical-rl; /* Xoay dọc chữ */
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}
.nav-btn:hover{background:var(--gray)}
.nav-btn.active{background:var(--black);color:var(--white)}

/* Trạng thái kết nối xếp theo chiều dọc ở dưới cùng */
.nav-status{
  margin-top:auto;
  padding:20px 0;
  font-size:9px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#888;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  border-top:1px solid var(--border);
}
.nav-status span {
  writing-mode:vertical-rl; /* Xoay dọc chữ trạng thái */
}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc}
.dot.online{background:#22c55e}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* GRID LAYOUT */
.g-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-left:1px solid var(--border);
  border-top:1px solid var(--border);
}
.g-block{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:12px; /* Khoảng cách chuẩn của hệ thống khối */
  position:relative;
  min-height:130px;
  overflow:hidden;
  transition:background .1s;
}
.g-block.dark{background:var(--black);color:var(--white)}
.g-block.light{background:var(--white);color:var(--black)}
.blk-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#777;margin-bottom:6px}
.g-block.dark .blk-label{color:#555}
.blk-title{font-size:14px;font-weight:bold;letter-spacing:.02em;margin-bottom:5px;line-height:1.3}
.blk-body{font-size:11px;line-height:1.75;color:#333}
.g-block.dark .blk-body{color:#bbb}

/* SPAN */
.sc1{grid-column:span 1}.sc2{grid-column:span 2}.sc3{grid-column:span 3}.sc4{grid-column:span 4}
.sr1{grid-row:span 1}.sr2{grid-row:span 2}

/* RESIZE CONTROLS */
.blk-controls{position:absolute;top:6px;right:6px;display:none;gap:3px}
.g-block:hover .blk-controls{display:flex}
.ctrl-btn{width:20px;height:20px;border:1px solid currentColor;background:transparent;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font);opacity:.5;transition:opacity .1s;color:inherit}
.ctrl-btn:hover{opacity:1;background:var(--white);color:var(--black)}
.g-block.dark .ctrl-btn:hover{background:var(--black);color:var(--white);border-color:var(--white)}

/* CHIPS */
.chip{display:inline-block;border:1px solid var(--black);padding:2px 8px;font-size:9px;letter-spacing:.05em;margin:2px 2px 0 0;cursor:pointer;text-transform:uppercase;transition:all .1s}
.chip:hover{background:var(--black);color:var(--white)}
.g-block.dark .chip{border-color:var(--white);color

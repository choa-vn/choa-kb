<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHOA — Knowledge Base</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;--gray:#f4f4f4;--border:#000;
  --font:'Courier New',monospace;
}
body{font-family:var(--font);font-size:11px;background:var(--white);color:var(--black);min-height:100vh}

/* NAV */
.nav{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;background:var(--white);height:36px}
.nav-btn{padding:8px 18px;border:none;border-right:1px solid var(--border);background:transparent;font-family:var(--font);font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.nav-btn:hover{background:var(--gray)}
.nav-btn.active{background:var(--black);color:var(--white)}
.nav-logo{padding:8px 16px;border-right:1px solid var(--border);font-size:12px;font-weight:bold;letter-spacing:.15em;display:flex;align-items:center}
.nav-status{margin-left:auto;padding:8px 14px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#888;display:flex;align-items:center;gap:6px;border-left:1px solid var(--border)}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc}
.dot.online{background:#22c55e}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* GRID LAYOUT CHI TIẾT 6x3 TOÀN TRANG */
.detail-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(3, 1fr);
  height: calc(100vh - 36px);
  background: var(--white);
  border-left: 1px solid var(--border);
}

.g-block{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:16px;
  position:relative;
  overflow:hidden;
  transition: background .1s;
}
/* Thiết lập mặc định các khối màu đen trên nền trắng */
.g-block {background:var(--black);color:var(--white)}
.blk-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:6px}
.blk-title{font-size:13px;font-weight:bold;letter-spacing:.02em;margin-bottom:8px;line-height:1.3}
.blk-body{font-size:11px;line-height:1.75;color:#ccc}

/* PHÓNG TO TOÀN MÀN HÌNH (ZOOM FULLSCREEN) */
.g-block.zoomed {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 99999 !important;
  margin: 0 !important;
  padding: 40px !important;
  box-sizing: border-box;
  overflow-y: auto;
  background: var(--black) !important;
  border: none !important;
}
.g-block.zoomed .blk-title {
  font-size: 24px !important;
  margin-bottom: 20px;
}
.g-block.zoomed .blk-body {
  font-size: 14px !important;
  line-height: 2;
  color: #fff !important;
}
.close-fs-btn {
  display: none;
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--white);
  color: var(--black);
  border: none;
  padding: 8px 16px;
  font-family: var(--font);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  cursor: pointer;
  font-weight: bold;
}
.g-block.zoomed .close-fs-btn {
  display: block;
}

/* CHIPS */
.chip{display:inline-block;border:1px solid var(--white);padding:2px 8px;font-size:9px;letter-spacing:.05em;margin:2px 2px 0 0;cursor:pointer;text-transform:uppercase;color:var(--white);background:transparent;transition:all .1s}
.chip:hover{background:var(--white);color:var(--black)}

/* LIST VIEW */
.search-bar{border-bottom:1px solid var(--border);display:flex;align-items:center}
.search-bar input,.search-bar select{border:none;border-right:1px solid var(--border);padding:8px 12px;font-family:var(--font);font-size:11px;background:var(--white);outline:none}
.search-bar select{width:150px}
.search-bar .slbl{padding:8px 12px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#999}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border)}
.l-card{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:16px;cursor:pointer;transition:background .1s}
.l-card:hover{background:var(--gray)}
.l-cat{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:5px}
.l-name{font-size:14px;font-weight:bold;margin-bottom:7px;letter-spacing:.02em}
.l-meta{font-size:10px;color:#666;line-height:1.8}
.l-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:3px}
.l-tag{font-size:9px;border:1px solid #ccc;padding:1px 6px;letter-spacing:.05em;text-transform:uppercase;color:#888}
.empty{padding:32px;color:#999;font-size:11px;grid-column:1/-1;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}

/* FORM VIEW */
.form-wrap{max-width:700px;margin:0 auto;padding:24px 16px}
.fsec{border:1px solid var(--border);margin-bottom:14px}
.fsec-hd{background:var(--black);color:var(--white);padding:7px 12px;font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.fbody{padding:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.frow1{margin-bottom:10px}
.flbl{display:block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#666;margin-bottom:3px}
input[type=text],textarea,select{width:100%;border:1px solid var(--border);padding:7px 9px;font-family:var(--font);font-size:11px;background:var(--white);outline:none;border-radius:0;color:var(--black);resize:vertical}
input:focus,textarea:focus,select:focus{background:var(--gray)}
.save-btn{width:100%;padding:11px;background:var(--black);color:var(--white);border:none;font-family:var(--font);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .15s}
.save-btn:hover{background:#222}
.save-btn:disabled{background:#888;cursor:not-allowed}

.block-builder{border:1px solid #ddd;margin-bottom:10px}
.block-builder-hd{background:var(--gray);padding:5px 10px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;color:var(--black)}
.block-builder-body{padding:10px}
.add-block-btn{border:1px dashed #ccc;width:100%;padding:8px;background:transparent;font-family:var(--font);font-size:10px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;margin-top:6px;color:#888;transition:all .15s}
.add-block-btn:hover{border-color:var(--black);color:var(--black)}
.rm-btn{border:none;background:transparent;cursor:pointer;font-size:12px;color:#888;padding:0 4px}
.rm-btn:hover{color:var(--black)}

.size-row,.color-row{display:none !important} /* Ẩn các bộ cấu hình size/color cũ vì hiện tại đã fix cứng theo layout 6x3 */

.back-btn{display:inline-block;padding:6px 14px;border:1px solid var(--border);font-family:var(--font);font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin:10px;background:transparent}
.back-btn:hover{background:var(--black);color:var(--white)}

.detail-actions{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}
.act-btn{padding:7px 16px;border:none;border-right:1px solid var(--border);background:transparent;font-family:var(--font);font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.act-btn:hover{background:var(--gray)}
.act-btn.danger:hover{background:#fee2e2;color:#991b1b}

.loading{padding:24px;color:#999;font-size:11px;letter-spacing:.05em;text-transform:uppercase;text-align:center}
#toast{position:fixed;bottom:20px;right:20px;background:var(--black);color:var(--white);padding:10px 18px;font-size:11px;letter-spacing:.05em;opacity:0;transition:opacity .2s;z-index:999999;pointer-events:none}
#toast.show{opacity:1}

/* Định dạng phụ trợ cho khối hình ảnh bên trái */
.img-placeholder-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 12px;
  justify-content: space-between;
}
.img-box {
  flex: 1;
  border: 1px dashed #444;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: .05em;
}
</style>
</head>
<body>

<div id="toast"></div>

<div class="nav">
  <div class="nav-logo">CHOA</div>
  <button class="nav-btn active" id="nb-list" onclick="goView('list')">Thư viện</button>
  <button class="nav-btn" id="nb-add" onclick="startAdd()">+ Thêm mới</button>
  <button class="nav-btn" id="nb-det" onclick="goView('detail')" style="display:none">↩ Chi tiết</button>
  <div class="nav-status"><div class="dot" id="status-dot"></div><span id="status-txt">Đang kết nối...</span></div>
</div>

<div class="view active" id="view-list">
  <div class="search-bar">
    <span class="slbl">Lọc:</span>
    <select id="fcat" onchange="renderList()">
      <option value="all">Tất cả</option>
      <option value="ct">Công trình</option>
      <option value="vl">Vật liệu</option>
      <option value="cd">Chi tiết thi công</option>
    </select>
    <input type="text" id="fsearch" placeholder="Tìm kiếm..." oninput="renderList()" style="flex:1;border:none;border-right:1px solid var(--border)">
  </div>
  <div class="list-grid" id="list-grid"><div class="loading">Đang tải...</div></div>
</div>

<div class="view" id="view-detail">
  <div style="display:flex;align-items:center;border-bottom:1px solid var(--border)">
    <button class="back-btn" style="margin:0;border:none;border-right:1px solid var(--border)" onclick="goView('list')">← Quay lại</button>
    <div class="detail-actions" style="border-bottom:none;flex:1">
      <button class="act-btn" onclick="startEdit()">✎ Chỉnh sửa</button>
      <button class="act-btn danger" onclick="deleteEntry()">✕ Xoá</button>
    </div>
  </div>
  <div id="grid-canvas" class="detail-grid"></div>
</div>

<div class="view" id="view-add">
  <div class="form-wrap">
    <div id="form-mode-label" style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:14px"></div>

    <div class="fsec">
      <div class="fsec-hd">Loại mục</div>
      <div class="fbody">
        <div class="frow1">
          <label class="flbl">Chọn loại</label>
          <select id="etype" onchange="toggleFormSections()">
            <option value="ct">Công trình</option>
            <option value="vl">Vật liệu</option>
            <option value="cd">Chi tiết thi công</option>
          </select>
        </div>
      </div>
    </div>

    <div id="f-ct">
      <div class="fsec"><div class="fsec-hd">Thông tin cơ bản</div><div class="fbody">
        <div class="frow">
          <div><label class="flbl">Tên công trình *</label><input type="text" id="ct-ten"></div>
          <div><label class="flbl">KTS / Đơn vị thiết kế</label><input type="text" id="ct-kts"></div>
        </div>
        <div class="frow">
          <div><label class="flbl">Năm hoàn thành</label><input type="text" id="ct-nam"></div>
          <div><label class="flbl">Vị trí</label><input type="text" id="ct-vitri"></div>
        </div>
        <div class="frow">
          <div><label class="flbl">Phong cách</label><input type="text" id="ct-pc"></div>
          <div><label class="flbl">Diện tích (m²)</label><input type="text" id="ct-dt"></div>
        </div>
      </div></div>
      <div class="fsec"><div class="fsec-hd">Nội dung nghiên cứu — các block (Tối đa 4)</div><div class="fbody">
        <div id="ct-blocks-wrap"></div>
        <button type="button" class="add-block-btn" onclick="addBlock('ct')">+ Thêm block thông tin</button>
      </div></div>
      <div class="fsec"><div class="fsec-hd">Liên kết</div><div class="fbody">
        <div class="frow1"><label class="flbl">Vật liệu liên quan (phân cách dấu phẩy)</label><input type="text" id="ct-vl"></div>
        <div class="frow1"><label class="flbl">Chi tiết thi công liên quan</label><input type="text" id="ct-cd"></div>
      </div></div>
    </div>

    <div id="f-vl" style="display:none">
      <div class="fsec"><div class="fsec-hd">Thông tin vật liệu</div><div class="fbody">
        <div class="frow">
          <div><label class="flbl">Tên vật liệu *</label><input type="text" id="vl-ten"></div>
          <div><label class="flbl">Loại</label><input type="text" id="vl-loai" placeholder="Kính, gỗ, bê tông..."></div>
        </div>
      </div></div>
      <div class="fsec"><div class="fsec-hd">Nội dung nghiên cứu — các block (Tối đa 4)</div><div class="fbody">
        <div id="vl-blocks-wrap"></div>
        <button type="button" class="add-block-btn" onclick="addBlock('vl')">+ Thêm block thông tin</button>
      </div></div>
      <div class="fsec"><div class="fsec-hd">Liên kết</div><div class="fbody">
        <div class="frow1"><label class="flbl">Công trình đã dùng vật liệu này</label><input type="text" id="vl-ct"></div>
      </div></div>
    </div>

    <div id="f-cd" style="display:none">
      <div class="fsec"><div class="fsec-hd">Thông tin chi tiết thi công</div><div class="fbody">
        <div class="frow">
          <div><label class="flbl">Tên chi tiết *</label><input type="text" id="cd-ten"></div>
          <div><label class="flbl">Vị trí áp dụng</label><input type="text" id="cd-vitri" placeholder="Mái, sàn, vách..."></div>
        </div>
      </div></div>
      <div class="fsec"><div class="fsec-hd">Nội dung nghiên cứu — các block (Tối đa 4)</div><div class="fbody">
        <div id="cd-blocks-wrap"></div>
        <button type="button" class="add-block-btn" onclick="addBlock('cd')">+ Thêm block thông tin</button>
      </div></div>
      <div class="fsec"><div class="fsec-hd">Liên kết</div><div class="fbody">
        <div class="frow">
          <div><label class="flbl">Vật liệu liên quan</label><input type="text" id="cd-vl"></div>
          <div><label class="flbl">Công trình liên quan</label><input type="text" id="cd-ct"></div>
        </div>
      </div></div>
    </div>

    <button class="save-btn" id="save-btn" onclick="saveEntry()">Lưu vào thư viện →</button>
  </div>
</div>

<script>
/* ── SUPABASE ── */
const SUPA_URL = 'https://mensqirmgksktrjdnyqi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lbnNxaXJtZ2tza3RyamRueXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjMwMDQsImV4cCI6MjA5NzMzOTAwNH0.R78C7oDxHv3EXq8EH88PiD2-ibOJbuWo7B2o3-2R9ok';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

/* ── STATE ── */
let entries = [];
let currentId = null;
let editMode = false;

/* ── INIT ── */
async function init(){
  try {
    const {data,error} = await db.from('entries').select('*').order('created_at',{ascending:false});
    if(error) throw error;
    entries = data || [];
    setStatus(true);
    renderList();
  } catch(e){
    setStatus(false);
    toast('Lỗi kết nối Supabase: '+e.message);
    renderList();
  }
}

function setStatus(online){
  document.getElementById('status-dot').className = 'dot'+(online?' online':'');
  document.getElementById('status-txt').textContent = online?'Đã kết nối':'Offline';
}

function toast(msg,duration=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}

function goView(v){
  ['list','detail','add'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('active',x===v);
    const nb=document.getElementById('nb-'+x);
    if(nb) nb.classList.toggle('active',x===v);
  });
  const detBtn=document.getElementById('nb-det');
  detBtn.style.display=v==='detail'?'':'none';
  if(v==='list') renderList();
}

/* ── LIST RENDER ── */
function catLabel(t){return t==='ct'?'Công trình':t==='vl'?'Vật liệu':'Chi tiết thi công'}

function renderList(){
  const cat=document.getElementById('fcat').value;
  const q=(document.getElementById('fsearch').value||'').toLowerCase();
  const grid=document.getElementById('list-grid');
  const items=entries.filter(e=>(cat==='all'||e.type===cat)&&(!q||(e.ten||'').toLowerCase().includes(q)));
  if(!items.length){
    grid.innerHTML='<div class="empty">Chưa có dữ liệu. Nhấn "+ Thêm mới" để bắt đầu.</div>';
    return;
  }
  grid.innerHTML=items.map(e=>{
    const meta=e.meta||{};
    const blocks=e.blocks||[];
    const links=e.links||{};
    let sub='';
    if(e.type==='ct') sub=`${meta.kts||''} ${meta.kts&&meta.nam?'·':''} ${meta.nam||''} ${meta.vitri?'· '+meta.vitri:''}`.trim();
    if(e.type==='vl') sub=`${meta.loai||''} ${blocks.length?'· '+blocks.map(b=>b.label).join(', '):''}`.trim();
    if(e.type==='cd') sub=`${meta.vitri||''} ${blocks.length?'· '+blocks.map(b=>b.label).join(', '):''}`.trim();
    const allLinks=[...(links.vl||'').split(','),...(links.cd||'').split(','),...(links.ct||'').split(',')].map(s=>s.trim()).filter(Boolean);
    return `<div class="l-card" onclick="showDetail('${e.id}')">
      <div class="l-cat">${catLabel(e.type)}</div>
      <div class="l-name">${e.ten}</div>
      <div class="l-meta">${sub}</div>
      ${allLinks.length?`<div class="l-tags">${allLinks.slice(0,4).map(l=>`<span class="l-tag">${l}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

/* ── DETAIL VIEW (HỆ LƯỚI 6x3 ĐÚNG CẤU TRÚC MỚI) ── */
function showDetail(id){
  const e=entries.find(x=>x.id===id);
  if(!e) return;
  currentId=id;
  const meta=e.meta||{};
  const blocks=e.blocks||[];
  const links=e.links||{};
  let html='';

  /* 1. CỘT TRONG CÙNG BÊN TRÁI (Cột 1, Hàng 1 -> 3): Tích hợp sẵn Ảnh & Bản vẽ */
  html+=`<div class="g-block" style="grid-column: 1; grid-row: 1 / 4;">
    <div class="blk-label">Hồ sơ phương án</div>
    <div class="blk-title" style="font-size:11px;">Ảnh & Bản vẽ tích hợp</div>
    <div class="img-placeholder-wrap">
      <div class="img-box">[ Ảnh Ngoại Thất ]</div>
      <div class="img-box">[ Ảnh Nội Thất ]</div>
      <div class="img-box">[ Bản Vẽ Kỹ Thuật ]</div>
    </div>
  </div>`;

  /* 2. HÀNG CỐ ĐỊNH 1 (Cột 2 -> 7, Hàng 1): Thông tin cơ bản */
  let infoBody='';
  if(e.type==='ct'){
    infoBody=`<strong>KTS/Thiết kế:</strong> ${meta.kts||'—'} | <strong>Năm:</strong> ${meta.nam||'—'} | <strong>Vị trí:</strong> ${meta.vitri||'—'} | <strong>Phong cách:</strong> ${meta.pc||'—'} | <strong>Diện tích:</strong> ${meta.dt ? meta.dt+' m²' : '—'}`;
  } else if(e.type==='vl'){
    infoBody=`<strong>Loại vật liệu:</strong> ${meta.loai||'—'}`;
  } else {
    infoBody= `<strong>Vị trí áp dụng thi công:</strong> ${meta.vitri||'—'}`;
  }

  html+=`<div class="g-block" style="grid-column: 2 / 7; grid-row: 1;">
    <div class="blk-label">${catLabel(e.type)} cố định</div>
    <div class="blk-title">${e.ten}</div>
    <div class="blk-body" style="color:#fff; font-size:12px;">${infoBody}</div>
  </div>`;

  /* 3. HÀNG CỐ ĐỊNH 2 (Cột 2 -> 7, Hàng 2): Liên kết liên quan */
  const vlArr=(links.vl||'').split(',').map(s=>s.trim()).filter(Boolean);
  const cdArr=(links.cd||'').split(',').map(s=>s.trim()).filter(Boolean);
  const ctArr=(links.ct||'').split(',').map(s=>s.trim()).filter(Boolean);
  const allChips=[
    ...vlArr.map(v=>`<span class="chip" onclick="goLinked('${v}','vl')">${v} ↗</span>`),
    ...cdArr.map(v=>`<span class="chip" onclick="goLinked('${v}','cd')">${v} ↗</span>`),
    ...ctArr.map(v=>`<span class="chip" onclick="goLinked('${v}','ct')">${v} ↗</span>`)
  ];

  html+=`<div class="g-block" style="grid-column: 2 / 7; grid-row: 2;">
    <div class="blk-label">Mạng lưới liên kết sơ đồ</div>
    <div class="blk-title" style="font-size:11px;">Mục dữ liệu phụ trợ liên quan</div>
    <div style="margin-top:8px">${allChips.length ? allChips.join('') : '<span style="color:#555">Không có liên kết phụ trợ nào.</span>'}</div>
  </div>`;

  /* 4. HÀNG 3 (Cột 2 -> 7): Các yếu tố từ 1-4 xếp theo hàng ngang, click phóng to toàn màn hình */
  for (let i = 0; i < 4; i++) {
    const b = blocks[i];
    const colStart = 2 + i; // Khối 1 -> Cột 2, Khối 2 -> Cột 3, Khối 3 -> Cột 4, Khối 4 -> Cột 5
    const colEnd = (i === 3) ? 7 : colStart + 1; // Khối cuối chiếm đến hết lưới (cột 6)

    if (b) {
      html+=`<div class="g-block" style="grid-column: ${colStart} / ${colEnd}; grid-row: 3;" onclick="toggleZoomBlock(this, event)">
        <button class="close-fs-btn" onclick="toggleZoomBlock(this.closest('.g-block'), event)">✕ Đóng màn hình</button>
        <div class="blk-label">YẾU TỐ THÀNH PHẦN 0${i+1}</div>
        <div class="blk-title">${b.label || 'Chưa đặt tiêu đề'}</div>
        <div class="blk-body">${b.body || 'Không có nội dung nghiên cứu.'}</div>
      </div>`;
    } else {
      // Ô trống dự phòng định dạng layout nếu dữ liệu nhập ít hơn 4 block
      html+=`<div class="g-block" style="grid-column: ${colStart} / ${colEnd}; grid-row: 3; background:#050505; border-color:#111;">
        <div class="blk-label" style="color:#333">YẾU TỐ THÀNH PHẦN 0${i+1}</div>
        <div class="blk-title" style="color:#333; font-style:italic;">Trống</div>
        <div class="blk-body" style="color:#222">Chưa bổ sung block nội dung nghiên cứu.</div>
      </div>`;
    }
  }

  document.getElementById('grid-canvas').innerHTML=html;
  goView('detail');
}

/* ── PHÓNG TO / THU NHỎ TOÀN MÀN HÌNH ── */
function toggleZoomBlock(blockEl, event) {
  if (event.target.classList.contains('chip') || event.target.tagName === 'A') return;
  
  if (blockEl.classList.contains('zoomed')) {
    event.stopPropagation();
    blockEl.classList.remove('zoomed');
    document.body.style.overflow = '';
  } else {
    blockEl.classList.add('zoomed');
    document.body.style.overflow = 'hidden';
  }
}

/* ── ĐIỀU HƯỚNG LIÊN KẾT ── */
function goLinked(name,type){
  const found=entries.find(e=>e.type===type&&(e.ten||'').toLowerCase().includes(name.toLowerCase()));
  if(found) showDetail(found.id);
  else toast(`"${name}" chưa có trong thư viện nghiên cứu`);
}

function toggleFormSections(){
  const t=document.getElementById('etype').value;
  ['ct','vl','cd'].forEach(x=>document.getElementById('f-'+x).style.display=x===t?'':'none');
}

/* ── BLOCK BUILDER FORM ── */
function addBlock(prefix,data={}){
  const wrap=document.getElementById(`${prefix}-blocks-wrap`);
  if(wrap.children.length >= 4) {
    toast("Hệ thống lưới chỉ hỗ trợ tối đa 4 yếu tố nội dung nghiên cứu!");
    return;
  }
  const uid='blk-'+Date.now()+'-'+Math.random().toString(36).slice(2,5);
  const div=document.createElement('div');
  div.className='block-builder';
  div.dataset.uid=uid;
  div.innerHTML=`
    <div class="block-builder-hd">
      <span>Block thông tin thành phần</span>
      <button type="button" class="rm-btn" onclick="this.closest('.block-builder').remove()">✕</button>
    </div>
    <div class="block-builder-body">
      <div class="frow1">
        <label class="flbl">Nhãn / Tiêu đề khối yếu tố</label>
        <input type="text" class="blk-label-inp" value="${data.label||''}" placeholder="Ví dụ: Cấu trúc mặt đứng, Giải pháp ánh sáng...">
      </div>
      <input type="hidden" class="blk-size-inp" value="M">
      <input type="hidden" class="blk-dark-inp" value="1">
      <div class="frow1">
        <label class="flbl">Nội dung chi tiết</label>
        <textarea class="blk-body-inp" rows="4">${data.body||''}</textarea>
      </div>
    </div>`;
  wrap.appendChild(div);
}

function collectBlocks(prefix){
  return [...document.querySelectorAll(`#${prefix}-blocks-wrap .block-builder`)].map(div=>({
    id:'b'+Date.now()+Math.random().toString(36).slice(2,5),
    label:div.querySelector('.blk-label-inp').value.trim(),
    body:div.querySelector('.blk-body-inp').value.trim(),
    size:'M',
    dark:true
  })).filter(b=>b.label||b.body);
}

/* ── SAVE DỮ LIỆU ── */
async function saveEntry(){
  const btn=document.getElementById('save-btn');
  btn.disabled=true;
  btn.textContent='Đang lưu...';
  const type=document.getElementById('etype').value;
  let ten='',meta={},blocks=[],links={};

  if(type==='ct'){
    ten=document.getElementById('ct-ten').value.trim();
    meta={kts:document.getElementById('ct-kts').value.trim(),nam:document.getElementById('ct-nam').value.trim(),vitri:document.getElementById('ct-vitri').value.trim(),pc:document.getElementById('ct-pc').value.trim(),dt:document.getElementById('ct-dt').value.trim()};
    blocks=collectBlocks('ct');
    links={vl:document.getElementById('ct-vl').value.trim(),cd:document.getElementById('ct-cd').value.trim()};
  } else if(type==='vl'){
    ten=document.getElementById('vl-ten').value.trim();
    meta={loai:document.getElementById('vl-loai').value.trim()};
    blocks=collectBlocks('vl');
    links={ct:document.getElementById('vl-ct').value.trim()};
  } else {
    ten=document.getElementById('cd-ten').value.trim();
    meta={vitri:document.getElementById('cd-vitri').value.trim()};
    blocks=collectBlocks('cd');
    links={vl:document.getElementById('cd-vl').value.trim(),ct:document.getElementById('cd-ct').value.trim()};
  }

  if(!ten){toast('Vui lòng nhập tên mục bắt buộc!');btn.disabled=false;btn.textContent='Lưu vào thư viện →';return;}

  try {
    if(editMode && currentId){
      const {error}=await db.from('entries').update({type,ten,meta,blocks,links}).eq('id',currentId);
      if(error) throw error;
      const idx=entries.findIndex(x=>x.id===currentId);
      if(idx>-1) entries[idx]={...entries[idx],type,ten,meta,blocks,links};
      toast('Đã cập nhật ✓');
      showDetail(currentId);
    } else {
      const id='e'+Date.now();
      const {error}=await db.from('entries').insert({id,type,ten,meta,blocks,links});
      if(error) throw error;
      entries.unshift({id,type,ten,meta,blocks,links});
      toast('Đã lưu vào thư viện ✓');
      resetForm();
      goView('list');
    }
  } catch(e){
    toast('Lỗi: '+e.message);
  }
  btn.disabled=false;
  btn.textContent='Lưu vào thư viện →';
}

/* ── EDIT / DELETE ── */
function startAdd(){
  editMode=false;
  resetForm();
  document.getElementById('form-mode-label').textContent='Thêm mục nghiên cứu mới';
  goView('add');
}

function startEdit(){
  const e=entries.find(x=>x.id===currentId);
  if(!e) return;
  editMode=true;
  resetForm();
  document.getElementById('form-mode-label').textContent='Chỉnh sửa thông tin mục';
  document.getElementById('etype').value=e.type;
  toggleFormSections();
  const meta=e.meta||{};
  const links=e.links||{};
  if(e.type==='ct'){
    document.getElementById('ct-ten').value=e.ten||'';
    document.getElementById('ct-kts').value=meta.kts||'';
    document.getElementById('ct-nam').value=meta.nam||'';
    document.getElementById('ct-vitri').value=meta.vitri||'';
    document.getElementById('ct-pc').value=meta.pc||'';
    document.getElementById('ct-dt').value=meta.dt||'';
    document.getElementById('ct-vl').value=links.vl||'';
    document.getElementById('ct-cd').value=links.cd||'';
    (e.blocks||[]).forEach(b=>addBlock('ct',b));
  } else if(e.type==='vl'){
    document.getElementById('vl-ten').value=e.ten||'';
    document.getElementById('vl-loai').value=meta.loai||'';
    document.getElementById('vl-ct').value=links.ct||'';
    (e.blocks||[]).forEach(b=>addBlock('vl',b));
  } else {
    document.getElementById('cd-ten').value=e.ten||'';
    document.getElementById('cd-vitri').value=meta.vitri||'';
    document.getElementById('cd-vl').value=links.vl||'';
    document.getElementById('cd-ct').value=links.ct||'';
    (e.blocks||[]).forEach(b=>addBlock('cd',b));
  }
  goView('add');
}

async function deleteEntry(){
  if(!confirm('Xoá mục nghiên cứu này khỏi thư viện? Thao tác này không thể hoàn tác.')) return;
  try {
    const {error}=await db.from('entries').delete().eq('id',currentId);
    if(error) throw error;
    entries=entries.filter(x=>x.id!==currentId);
    currentId=null;
    toast('Đã xoá mục dữ liệu');
    goView('list');
  } catch(e){
    toast('Lỗi hệ thống: '+e.message);
  }
}

function resetForm(){
  ['ct-ten','ct-kts','ct-nam','ct-vitri','ct-pc','ct-dt','ct-vl','ct-cd',
   'vl-ten','vl-loai','vl-ct','cd-ten','cd-vitri','cd-vl','cd-ct']
   .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['ct','vl','cd'].forEach(p=>{
    const w=document.getElementById(`${p}-blocks-wrap`);
    if(w) w.innerHTML='';
  });
  document.getElementById('etype').value='ct';
  toggleFormSections();
}

init();
</script>
</body>
</html>
